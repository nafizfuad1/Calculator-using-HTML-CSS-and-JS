<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="input-result">
        <input type="text" class="input" />
        <h2 class="result"></h2>
      </div>
      <div class="row">
        <button class="button bg-reddish">C</button>
        <button class="button bg-reddish">Del</button>
        <button class="button bg-reddish">%</button>
        <button class="button bg-reddish">÷</button>
      </div>

      <div class="row">
        <button class="button">1</button>
        <button class="button">2</button>
        <button class="button">3</button>
        <button class="button bg-reddish">x</button>
      </div>

      <div class="row">
        <button class="button">4</button>
        <button class="button">5</button>
        <button class="button">6</button>
        <button class="button bg-reddish">+</button>
      </div>

      <div class="row">
        <button class="button">7</button>
        <button class="button">8</button>
        <button class="button">9</button>
        <button class="button bg-reddish">-</button>
      </div>
      <div class="row">
        <button class="button" id="zero">0</button>
        <button class="button">.</button>
        <button class="button equal">=</button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
